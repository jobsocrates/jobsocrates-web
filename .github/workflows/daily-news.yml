name: 뉴스 자동 수집

on:
  # 자동 스케줄 중단 — 수동 실행(workflow_dispatch)만 남김.
  # 다시 켜려면 아래 schedule 블록 주석 해제.
  # schedule:
  #   - cron: "0 0 * * *"   # 매일 KST 09:00 (UTC 00:00)
  workflow_dispatch:  # GitHub Actions 탭에서 수동 실행만 가능

jobs:
  generate-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 패키지 설치
        run: npm ci

      - name: 뉴스 수집 및 임시저장
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/generate-news.mjs
